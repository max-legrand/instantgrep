name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  release:
    name: Build & Release
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            asset_name: instantgrep-linux-amd64
          - os: macos-latest
            asset_name: instantgrep-darwin-arm64
    steps:
      - uses: actions/checkout@v4

      - uses: erlef/setup-beam@v1
        with:
          otp-version: "27"
          elixir-version: "1.16"

      - run: mix deps.get
      - run: mix test
      - run: mix escript.build

      - name: Package
        run: |
          tar czf ${{ matrix.asset_name }}.tar.gz instantgrep instantgrep-bench README.md LICENSE
          shasum -a 256 ${{ matrix.asset_name }}.tar.gz > ${{ matrix.asset_name }}.tar.gz.sha256

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ${{ matrix.asset_name }}.tar.gz
            ${{ matrix.asset_name }}.tar.gz.sha256

  update-formula:
    name: Update Homebrew Formula
    needs: release
    runs-on: ubuntu-latest
    environment: prd
    steps:
      - name: Get version
        id: version
        run: echo "version=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Download checksums
        run: |
          sleep 10
          curl -sL "https://github.com/${{ github.repository }}/releases/download/v${{ steps.version.outputs.version }}/instantgrep-darwin-arm64.tar.gz.sha256" -o darwin.sha256
          curl -sL "https://github.com/${{ github.repository }}/releases/download/v${{ steps.version.outputs.version }}/instantgrep-linux-amd64.tar.gz.sha256" -o linux.sha256

      - name: Clone homebrew tap
        run: |
          git clone https://x-access-token:${{ secrets.HOMEBREW_TAP_TOKEN }}@github.com/${{ github.repository_owner }}/homebrew-instantgrep.git tap
        
      - name: Update formula
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          DARWIN_SHA=$(cut -d ' ' -f1 darwin.sha256)
          LINUX_SHA=$(cut -d ' ' -f1 linux.sha256)
          REPO="${{ github.repository }}"

          cat > tap/Formula/instantgrep.rb << 'FORMULA'
          class Instantgrep < Formula
            desc "Fast regex search using trigram indexes"
            homepage "https://github.com/REPO_PLACEHOLDER"
            version "VERSION_PLACEHOLDER"
            license "MIT"

            on_macos do
              on_arm do
                url "https://github.com/REPO_PLACEHOLDER/releases/download/vVERSION_PLACEHOLDER/instantgrep-darwin-arm64.tar.gz"
                sha256 "DARWIN_SHA_PLACEHOLDER"
              end
            end

            on_linux do
              on_intel do
                url "https://github.com/REPO_PLACEHOLDER/releases/download/vVERSION_PLACEHOLDER/instantgrep-linux-amd64.tar.gz"
                sha256 "LINUX_SHA_PLACEHOLDER"
              end
            end

            depends_on "erlang"

            def install
              bin.install "instantgrep"
              bin.install "instantgrep-bench"
              bin.install_symlink "instantgrep" => "igrep"
              bin.install_symlink "instantgrep" => "ig"
            end

            test do
              assert_match "instantgrep", shell_output("#{bin}/instantgrep --help")
            end
          end
          FORMULA

          sed -i "s|REPO_PLACEHOLDER|${REPO}|g" tap/Formula/instantgrep.rb
          sed -i "s|VERSION_PLACEHOLDER|${VERSION}|g" tap/Formula/instantgrep.rb
          sed -i "s|DARWIN_SHA_PLACEHOLDER|${DARWIN_SHA}|g" tap/Formula/instantgrep.rb
          sed -i "s|LINUX_SHA_PLACEHOLDER|${LINUX_SHA}|g" tap/Formula/instantgrep.rb

      - name: Push formula update
        run: |
          cd tap
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/instantgrep.rb
          git commit -m "Update instantgrep to v${{ steps.version.outputs.version }}"
          git push

